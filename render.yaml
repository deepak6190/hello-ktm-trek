services:
  - type: web
    name: hello-ktm-trek-api
    runtime: node
    rootDir: hello-ktm-trek-api
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: MONGODB_URI
        sync: false
