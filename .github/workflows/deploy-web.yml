name: Deploy Web App to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'hello-ktm-trek/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: hello-ktm-trek/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: hello-ktm-trek

      - name: Export static web build
        run: npx expo export --platform web
        working-directory: hello-ktm-trek
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.API_URL }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: hello-ktm-trek/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
